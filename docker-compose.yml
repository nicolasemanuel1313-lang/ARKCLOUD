services:
  arckcloud:
    build: .
    container_name: arckcloud
    restart: unless-stopped

    # Carrega todas as variáveis do .env automaticamente
    env_file:
      - .env

    environment:
      - PYTHONUNBUFFERED=1

    # Persiste arquivos gerados localmente
    volumes:
      - ./data:/app/data

    # Logs com rotação automática
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  evolution-api:
    container_name: evolution_api
    image: atendai/evolution-api:v2.2.0
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.evolution
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  evolution_instances: